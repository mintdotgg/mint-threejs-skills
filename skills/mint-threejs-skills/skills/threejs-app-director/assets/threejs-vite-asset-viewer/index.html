<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#151715" />
    <title>Asset Viewer</title>
  </head>
  <body>
    <main id="app" class="viewer-shell">
      <canvas id="viewer-canvas" aria-label="Interactive 3D asset viewer"></canvas>

      <div id="loading-surface" class="loading-surface" aria-live="polite">
        <img id="loading-image" alt="" hidden />
        <div class="loading-scrim"></div>
        <div class="loading-copy">
          <span class="spinner" aria-hidden="true"></span>
          <span id="loading-label">Loading asset...</span>
        </div>
      </div>

      <button
        id="details-toggle"
        class="icon-button details-toggle"
        type="button"
        aria-controls="details-dialog"
        aria-expanded="false"
        title="View asset details"
      >
        <span aria-hidden="true">i</span>
        <span class="sr-only">View asset details</span>
      </button>

      <dialog
        id="details-dialog"
        class="details-dialog"
        aria-labelledby="asset-title"
      >
        <header class="details-header">
          <div>
            <p id="asset-kind" class="eyebrow">3D asset</p>
            <h1 id="asset-title">Mint asset</h1>
          </div>
          <button id="details-close" class="icon-button" type="button" title="Close details">
            <span aria-hidden="true">×</span>
            <span class="sr-only">Close details</span>
          </button>
        </header>

        <div class="details-content">
          <section id="animation-section" class="details-section" hidden>
            <h2>Animations</h2>
            <label class="select-label" for="animation-select">Selected clip</label>
            <select id="animation-select"></select>
            <div class="animation-player">
              <button id="animation-previous" class="icon-button" type="button" title="Previous animation">‹</button>
              <button id="animation-toggle" class="icon-button" type="button" title="Pause animation">Ⅱ</button>
              <button id="animation-next" class="icon-button" type="button" title="Next animation">›</button>
              <input id="animation-seek" type="range" min="0" max="1000" value="0" aria-label="Animation playhead" />
            </div>
          </section>

          <section class="details-section">
            <h2>Info</h2>
            <dl id="metadata-list" class="metadata-list"></dl>
          </section>

          <section id="material-maps-section" class="details-section" hidden>
            <h2>Maps</h2>
            <div id="material-map-items" class="material-map-items"></div>
          </section>

          <section id="prompt-section" class="details-section" hidden>
            <h2>Prompt</h2>
            <p id="asset-prompt" class="prompt-copy"></p>
          </section>
        </div>

        <footer id="download-actions" class="download-actions"></footer>
      </dialog>

      <div class="viewer-bottom">
        <p id="status-line" class="status-line" aria-live="polite">Preparing viewer</p>

        <div id="model-toolbar" class="control-toolbar" role="toolbar" aria-label="Mesh render mode" hidden>
          <button id="wireframe-toggle" type="button" aria-pressed="false">Wire</button>
          <span class="toolbar-divider" aria-hidden="true"></span>
          <button type="button" data-render-mode="material" aria-pressed="true">Material</button>
          <button type="button" data-render-mode="solid" aria-pressed="false">Solid</button>
          <button type="button" data-render-mode="normal" aria-pressed="false">Normal</button>
          <span class="toolbar-divider" aria-hidden="true"></span>
          <button id="reset-view" type="button">Reset</button>
        </div>

        <div id="world-toolbar" class="control-toolbar" role="toolbar" aria-label="World navigation" hidden>
          <span class="control-hint">Drag look · WASD move · Shift fast</span>
          <span class="toolbar-divider" aria-hidden="true"></span>
          <button id="reset-world-view" type="button">Reset</button>
        </div>

        <div id="material-toolbar" class="control-toolbar" role="toolbar" aria-label="Material preview" hidden>
          <span class="control-hint">Drag to orbit · Scroll to zoom</span>
          <span class="toolbar-divider" aria-hidden="true"></span>
          <button id="reset-material-view" type="button">Reset</button>
        </div>

        <nav id="asset-carousel" class="asset-carousel" aria-label="Asset pack items" hidden>
          <button id="carousel-previous" class="carousel-arrow" type="button" title="Previous asset">‹</button>
          <div id="carousel-items" class="carousel-items"></div>
          <button id="carousel-next" class="carousel-arrow" type="button" title="Next asset">›</button>
        </nav>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
